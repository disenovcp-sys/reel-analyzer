<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reel Analyzer — VCP</title>
<style>
  :root {
    --bg: #0a0a0a;
    --card: #111;
    --border: #222;
    --accent: #e8ff3b;
    --text: #f0f0f0;
    --muted: #888;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; padding: 24px 16px; }

  .header { text-align: center; margin-bottom: 32px; }
  .header h1 { font-size: 1.8rem; font-weight: 700; letter-spacing: -0.5px; }
  .header h1 span { color: var(--accent); }
  .header p { color: var(--muted); margin-top: 6px; font-size: 0.9rem; }

  .input-area { max-width: 640px; margin: 0 auto 32px; }
  .url-row { display: flex; gap: 8px; }
  .url-row input {
    flex: 1; background: var(--card); border: 1px solid var(--border);
    color: var(--text); padding: 14px 16px; border-radius: var(--radius);
    font-size: 0.95rem; outline: none; transition: border 0.2s;
  }
  .url-row input:focus { border-color: var(--accent); }
  .url-row input::placeholder { color: var(--muted); }
  .btn-analyze {
    background: var(--accent); color: #000; font-weight: 700;
    padding: 14px 24px; border: none; border-radius: var(--radius);
    cursor: pointer; font-size: 0.95rem; white-space: nowrap;
    transition: opacity 0.2s;
  }
  .btn-analyze:hover { opacity: 0.88; }
  .btn-analyze:disabled { opacity: 0.4; cursor: not-allowed; }

  .status { max-width: 640px; margin: 0 auto 24px; }
  .status-msg {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px 20px;
    display: flex; align-items: center; gap: 12px; font-size: 0.9rem;
  }
  .spinner {
    width: 18px; height: 18px; border: 2px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.8s linear infinite; flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    background: #1a0808; border: 1px solid #3a1010;
    border-radius: var(--radius); padding: 14px 18px;
    color: #ff7070; font-size: 0.9rem;
  }

  .analyses { max-width: 900px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }

  .analysis-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden;
  }
  .card-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px 20px; border-bottom: 1px solid var(--border);
    flex-wrap: wrap; gap: 8px;
  }
  .card-url { font-size: 0.8rem; color: var(--muted); word-break: break-all; }
  .card-url a { color: var(--muted); text-decoration: none; }
  .card-url a:hover { color: var(--text); }
  .card-badge {
    font-size: 0.75rem; font-weight: 700; padding: 4px 10px;
    border-radius: 20px; background: #1a1f00; color: var(--accent);
    text-transform: uppercase; letter-spacing: 0.5px; flex-shrink: 0;
  }
  .card-body { padding: 20px; display: grid; gap: 20px; }

  .section-title { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 8px; }

  .hook-block { background: #0f1300; border: 1px solid #2a3000; border-radius: 8px; padding: 16px; }
  .hook-type-label { font-size: 1rem; font-weight: 700; color: var(--accent); margin-bottom: 6px; }
  .hook-breakdown { font-size: 0.88rem; color: #ccc; line-height: 1.6; }

  .narrative-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
  .nar-item { background: #0d0d0d; border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
  .nar-label { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); margin-bottom: 4px; }
  .nar-text { font-size: 0.82rem; color: #ddd; line-height: 1.5; }

  .insight-block { font-size: 0.88rem; color: #ccc; line-height: 1.6; }

  .vcp-block {
    background: #0d0f00; border: 1px solid #2a2e00; border-radius: 8px; padding: 16px;
  }
  .vcp-title { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--accent); margin-bottom: 8px; }
  .vcp-text { font-size: 0.88rem; color: #ddd; line-height: 1.6; }

  .card-actions { padding: 0 20px 16px; display: flex; gap: 8px; }
  .btn-sm {
    font-size: 0.78rem; padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border);
    background: transparent; color: var(--muted); cursor: pointer; transition: all 0.2s;
  }
  .btn-sm:hover { border-color: var(--muted); color: var(--text); }
  .btn-sm.danger:hover { border-color: #ff4444; color: #ff4444; }

  .empty { text-align: center; color: var(--muted); padding: 60px 20px; font-size: 0.9rem; }
</style>
</head>
<body>

<div class="header">
  <h1>Reel <span>Analyzer</span></h1>
  <p>Pegá el link de un reel → análisis automático del video con IA</p>
</div>

<div class="input-area">
  <div class="url-row">
    <input type="url" id="urlInput" placeholder="https://www.instagram.com/reel/..." autocomplete="off">
    <button class="btn-analyze" id="analyzeBtn" onclick="analyze()">Analizar</button>
  </div>
</div>

<div class="status" id="statusArea" style="display:none"></div>
<div id="errorArea" style="max-width:640px;margin:0 auto 20px;"></div>

<div class="analyses" id="analyses"></div>

<script>
const HOOK_LABELS = {
  curiosity_gap: 'Curiosity Gap',
  dato_contraintuitivo: 'Dato Contraintuitivo',
  promesa_revelacion: 'Promesa / Revelación',
  conflicto: 'Conflicto',
  identificacion: 'Identificación',
  otro: 'Otro',
};

const NAR_LABELS = {
  hook: '🎣 Hook',
  contexto: '📍 Contexto',
  tension: '⚡ Tensión',
  resolucion: '✅ Resolución',
  cta: '📢 CTA',
};

let analyses = JSON.parse(localStorage.getItem('reel_analyses') || '[]');

function save() {
  localStorage.setItem('reel_analyses', JSON.stringify(analyses));
}

function setStatus(msg) {
  const area = document.getElementById('statusArea');
  if (!msg) { area.style.display = 'none'; return; }
  area.style.display = 'block';
  area.innerHTML = `<div class="status-msg"><div class="spinner"></div><span>${msg}</span></div>`;
}

function setError(msg) {
  document.getElementById('errorArea').innerHTML = msg
    ? `<div class="error-msg">⚠️ ${msg}</div>` : '';
}

async function analyze() {
  const url = document.getElementById('urlInput').value.trim();
  if (!url) return;

  const btn = document.getElementById('analyzeBtn');
  btn.disabled = true;
  setError('');
  setStatus('Descargando video de Instagram…');

  try {
    const res = await fetch('/api/process', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url }),
    });

    setStatus('Analizando video con Gemini…');

    if (!res.ok) {
      const d = await res.json().catch(() => ({}));
      throw new Error(d.error || `Error ${res.status}`);
    }

    const data = await res.json();
    analyses.unshift({ url, ts: Date.now(), ...data });
    save();
    render();
    document.getElementById('urlInput').value = '';
  } catch (e) {
    setError(e.message);
  } finally {
    setStatus(null);
    btn.disabled = false;
  }
}

document.getElementById('urlInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') analyze();
});

function deleteEntry(idx) {
  if (!confirm('¿Eliminar este análisis?')) return;
  analyses.splice(idx, 1);
  save();
  render();
}

function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/\n/g,'<br>');
}

function render() {
  const container = document.getElementById('analyses');
  if (!analyses.length) {
    container.innerHTML = '<div class="empty">Todavía no analizaste ningún reel.<br>Pegá un link arriba y presioná Analizar.</div>';
    return;
  }

  container.innerHTML = analyses.map((a, i) => {
    const hookLabel = HOOK_LABELS[a.hook_type] || a.hook_type || '—';
    const narItems = Object.entries(NAR_LABELS).map(([key, label]) => {
      const val = a.narrative_structure?.[key] || '—';
      return `<div class="nar-item"><div class="nar-label">${label}</div><div class="nar-text">${esc(val)}</div></div>`;
    }).join('');

    const visualBlock = a.visual_elements ? `
      <div>
        <div class="section-title">Elementos visuales</div>
        <div class="insight-block">${esc(a.visual_elements)}</div>
      </div>` : '';

    return `
    <div class="analysis-card">
      <div class="card-header">
        <div class="card-url"><a href="${esc(a.url)}" target="_blank" rel="noopener">${esc(a.url)}</a>${a.isImage ? ' <span style="color:#888">(imagen)</span>' : ''}</div>
        <div class="card-badge">${esc(hookLabel)}</div>
      </div>
      <div class="card-body">
        <div>
          <div class="section-title">Hook</div>
          <div class="hook-block">
            <div class="hook-type-label">${esc(hookLabel)}</div>
            <div class="hook-breakdown">${esc(a.hook_breakdown || '—')}</div>
          </div>
        </div>
        <div>
          <div class="section-title">Estructura narrativa</div>
          <div class="narrative-grid">${narItems}</div>
        </div>
        ${visualBlock}
        <div>
          <div class="section-title">Por qué funcionó</div>
          <div class="insight-block">${esc(a.why_it_worked || '—')}</div>
        </div>
        <div class="vcp-block">
          <div class="vcp-title">Adaptación para VCP</div>
          <div class="vcp-text">${esc(a.vcp_adaptation || '—')}</div>
        </div>
      </div>
      <div class="card-actions">
        <button class="btn-sm danger" onclick="deleteEntry(${i})">Eliminar</button>
      </div>
    </div>`;
  }).join('');
}

render();
</script>
</body>
</html>
